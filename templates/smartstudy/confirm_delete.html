{% extends 'base.html' %}
{% block title %}Delete {{ type }} – SmartStudy{% endblock %}
{% block content %}
<div class="page-header">
  <h1 class="page-title">Delete {{ type }}</h1>
</div>
<div class="card" style="max-width:480px;">
  <p style="font-size:15px;margin-bottom:1.5rem;">
    Are you sure you want to delete <strong>{{ object }}</strong>? This cannot be undone.
  </p>
  <form method="post">
    {% csrf_token %}
    <div class="gap-2">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="javascript:history.back()" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
